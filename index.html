<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电力现货数据可视化</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }
    body {
      background: #f5f7fa;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 22px;
    }
    .status {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .select-box {
      text-align: center;
      margin-bottom: 24px;
    }
    #period {
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      min-width: 220px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .card h2 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #333;
    }
    canvas {
      width: 100% !important;
      height: 280px !important;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }
    th {
      background: #f8f9fa;
    }
  </style>
</head>

<body>
  <h1>⚡ 电力现货数据可视化平台</h1>
  <div class="status" id="status">加载中...</div>

  <div class="select-box">
    <select id="period">
      <option value="all">📅 全部数据</option>
      <option value="1-15">1月 1日 - 15日</option>
      <option value="16-31">1月 16日 - 31日</option>
    </select>
  </div>

  <div class="card">
    <h2>📈 发电侧成交量</h2>
    <canvas id="chartGen"></canvas>
  </div>
  <div class="card">
    <h2>📊 用户侧成交量</h2>
    <canvas id="chartUser"></canvas>
  </div>
  <div class="card">
    <h2>💰 用户侧平均电价</h2>
    <canvas id="chartPrice"></canvas>
  </div>

  <div class="card">
    <h2>📋 详细数据（同步筛选）</h2>
    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>发电侧</th>
          <th>用户侧</th>
          <th>均价</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

<script>
  let allData = [];
  let charts = {};

  // 初始化图表
  function initCharts() {
    const cfg = {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: false },
      scales: { x: { grid: { display: false } } }
    };

    charts.gen = new Chart(document.getElementById('chartGen'), {
      type: 'line', data: { labels: [], datasets: [{ data: [], borderColor: '#2563eb', tension: 0.3 }] }, options: cfg
    });
    charts.user = new Chart(document.getElementById('chartUser'), {
      type: 'line', data: { labels: [], datasets: [{ data: [], borderColor: '#0891b2', tension: 0.3 }] }, options: cfg
    });
    charts.price = new Chart(document.getElementById('chartPrice'), {
      type: 'line', data: { labels: [], datasets: [{ data: [], borderColor: '#ea580c', tension: 0.3 }] }, options: cfg
    });
  }

  // 加载数据
  async function loadData() {
    try {
      const res = await fetch('data.json?v='+Date.now());
      allData = await res.json();
      render();
      document.getElementById('status').innerText = "✅ 数据加载完成";
    } catch (e) {
      document.getElementById('status').innerText = "❌ 加载失败";
    }
  }

  // 筛选日期（真正能工作的版本！）
  function getFilteredData() {
    const v = document.getElementById('period').value;
    if (v === 'all') return allData;

    return allData.filter(item => {
      const day = parseFloat(item.日期);
      if (v === '1-15') return day >= 1 && day <= 15;
      if (v === '16-31') return day >= 16 && day <= 31;
      return true;
    });
  }

  // 统一刷新：图表 + 表格
  function render() {
    const data = getFilteredData();
    const dates = data.map(i => i.日期);
    const gen = data.map(i => +i['发电侧总成交量（MWh）'] || 0);
    const use = data.map(i => +i['用户侧总成交量（MWh)'] || 0);
    const price = data.map(i => +i['用户侧总平均价（元/MWh）'] || 0);

    // 刷新图表
    charts.gen.data.labels = dates; charts.gen.data.datasets[0].data = gen; charts.gen.update();
    charts.user.data.labels = dates; charts.user.data.datasets[0].data = use; charts.user.update();
    charts.price.data.labels = dates; charts.price.data.datasets[0].data = price; charts.price.update();

    // 刷新表格
    const tb = document.getElementById('tableBody');
    tb.innerHTML = data.map(row => `
      <tr>
        <td>${row.日期}</td>
        <td>${parseFloat(row['发电侧总成交量（MWh）'] || 0).toLocaleString()}</td>
        <td>${parseFloat(row['用户侧总成交量（MWh)'] || 0).toLocaleString()}</td>
        <td>${row['用户侧总平均价（元/MWh）']}</td>
      </tr>
    `).join('');
  }

  // 切换下拉框立即刷新
  document.getElementById('period').addEventListener('change', render);

  // 启动
  initCharts();
  loadData();
</script>
</body>
</html>
