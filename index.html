<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电力数据可视化</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }
    body {
      background: #f5f7fa;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
    }
    .tip {
      text-align: center;
      color: #666;
      margin-bottom: 20px;
    }

    .select-box {
      text-align: center;
      margin-bottom: 24px;
    }
    #period {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .card h2 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #333;
    }
    canvas {
      width: 100% !important;
      height: 280px !important;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }
    th {
      background: #f8f9fa;
    }
  </style>
</head>

<body>
  <h1>⚡ 电力现货数据可视化</h1>
  <div class="tip" id="status">加载中...</div>

  <div class="select-box">
    <select id="period">
      <option value="all">全部数据</option>
      <option value="1-15">1月1日-15日</option>
      <option value="16-31">1月16日-31日</option>
    </select>
  </div>

  <div class="card">
    <h2>📈 发电侧成交量</h2>
    <canvas id="chartGen"></canvas>
  </div>

  <div class="card">
    <h2>📊 用户侧成交量</h2>
    <canvas id="chartUser"></canvas>
  </div>

  <div class="card">
    <h2>💰 用户侧平均电价</h2>
    <canvas id="chartPrice"></canvas>
  </div>

  <div class="card">
    <h2>📋 详细数据</h2>
    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>发电侧成交量</th>
          <th>用户侧成交量</th>
          <th>用户侧均价</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

<script>
  // 全局数据
  let allData = [];
  let charts = {};

  // 初始化三个图表
  function initCharts() {
    const cfg = {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: false },
      scales: { x: { grid: { display: false } } }
    };

    charts.gen = new Chart(document.getElementById('chartGen'), {
      type: 'line', data: { labels: [], datasets: [{ data: [], borderColor: '#2563eb', tension: 0.3 }] }, options: cfg
    });

    charts.user = new Chart(document.getElementById('chartUser'), {
      type: 'line', data: { labels: [], datasets: [{ data: [], borderColor: '#0891b2', tension: 0.3 }] }, options: cfg
    });

    charts.price = new Chart(document.getElementById('chartPrice'), {
      type: 'line', data: { labels: [], datasets: [{ data: [], borderColor: '#ea580c', tension: 0.3 }] }, options: cfg
    });
  }

  // 加载原始数据
  async function loadData() {
    const res = await fetch('data.json');
    allData = await res.json();
    render();
    document.getElementById('status').innerText = '✅ 数据加载完成';
  }

  // 根据下拉框值筛选
  function filterData(data) {
    const v = document.getElementById('period').value;
    if (v === 'all') return data;
    const day = d => Number(d.日期);
    if (v === '1-15') return data.filter(d => day(d) >= 1 && day(d) <= 15);
    if (v === '16-31') return data.filter(d => day(d) >= 16 && day(d) <= 31);
    return data;
  }

  // 统一渲染：图表 + 表格
  function render() {
    const filtered = filterData(allData);
    const dates = filtered.map(i => i.日期);
    const gen = filtered.map(i => +i['发电侧总成交量（MWh）'] || 0);
    const use = filtered.map(i => +i['用户侧总成交量（MWh)'] || 0);
    const price = filtered.map(i => +i['用户侧总平均价（元/MWh）'] || 0);

    // 更新图表
    charts.gen.data.labels = dates; charts.gen.data.datasets[0].data = gen; charts.gen.update();
    charts.user.data.labels = dates; charts.user.data.datasets[0].data = use; charts.user.update();
    charts.price.data.labels = dates; charts.price.data.datasets[0].data = price; charts.price.update();

    // 更新表格
    const tb = document.getElementById('tableBody');
    tb.innerHTML = filtered.map(row => `
      <tr>
        <td>${row.日期}</td>
        <td>${parseFloat(row['发电侧总成交量（MWh）'] || 0).toLocaleString()}</td>
        <td>${parseFloat(row['用户侧总成交量（MWh)'] || 0).toLocaleString()}</td>
        <td>${row['用户侧总平均价（元/MWh）']}</td>
      </tr>
    `).join('');
  }

  // 监听切换
  document.getElementById('period').addEventListener('change', render);

  // 启动
  initCharts();
  loadData();
</script>
</body>
</html>
