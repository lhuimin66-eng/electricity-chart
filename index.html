<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电力数据可视化系统</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui, sans-serif; }
    body { background:#0f172a; padding:20px; max-width:1200px; margin:0 auto; color:#e2e8f0; }
    h1 { text-align:center; margin-bottom:8px; font-size:24px; color:#f8fafc; font-weight:600; }
    .status { text-align:center; color:#94a3b8; font-size:14px; margin-bottom:16px; }
    
    .select-box { text-align:center; margin-bottom:24px; }
    #period { 
      padding:10px 14px; border-radius:8px; 
      border:1px solid #1e293b; min-width:240px;
      background:#1e293b; color:#e2e8f0;
    }

    /* 顶部驾驶舱 */
    .dashboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .dash-card {
      background:#1e293b;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      border:1px solid #334155;
    }
    .dash-label {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    .dash-value {
      font-size: 24px;
      font-weight: bold;
      background: linear-gradient(90deg, #00d8ff, #6366f1);
      -webkit-background-clip: text;
      color: transparent;
    }
    .dash-unit {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
    }
    .dash-date {
      font-size: 12px;
      color: #64748b;
      margin-top: 6px;
    }

    /* 日期选择器 */
    .date-picker-box {
      text-align: center;
      margin-bottom: 20px;
      color:#cbd5e1;
    }
    .date-picker-box input {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #334155;
      background:#1e293b;
      color:#e2e8f0;
    }

    .card { 
      background:#1e293b; 
      border-radius:12px; 
      padding:20px; 
      margin-bottom:20px; 
      border:1px solid #334155;
    }
    .card h2 { font-size:16px; margin-bottom:12px; color:#f1f5f9; }

    canvas { width:100% !important; height:280px !important; }

    table { width:100%; border-collapse:collapse; color:#e2e8f0; }
    th, td { padding:10px; text-align:center; border-bottom:1px solid #334155; }
    th { background:#1e293b; color:#cbd5e1; }

    .analysis-box {
      background: #1e293b;
      border-left:4px solid #00d8ff;
      padding:14px 16px;
      border-radius:8px;
      margin-bottom:20px;
      line-height:1.5;
      font-size:14px;
      color:#cbd5e1;
    }
    .analysis-box h3 {
      font-size:15px;
      margin-bottom:6px;
      color:#00d8ff;
    }
  </style>
</head>

<body>
  <h1>⚡ 电力数据可视化系统</h1>
  <div class="status" id="status">加载中...</div>

  <!-- 顶部驾驶舱 -->
  <div class="dashboard">
    <div class="dash-card">
      <div class="dash-label">昨日发电侧电量</div>
      <div class="dash-value" id="lastGen">-</div>
      <div class="dash-unit">MWh</div>
      <div class="dash-date" id="lastDate">-</div>
    </div>
    <div class="dash-card">
      <div class="dash-label">昨日用户侧电量</div>
      <div class="dash-value" id="lastUse">-</div>
      <div class="dash-unit">MWh</div>
      <div class="dash-date">-</div>
    </div>
    <div class="dash-card">
      <div class="dash-label">昨日电价</div>
      <div class="dash-value" id="lastPrice">-</div>
      <div class="dash-unit">元/MWh</div>
      <div class="dash-date">-</div>
    </div>
  </div>

  <!-- 日期选择器：手动选某天数据 -->
  <div class="date-picker-box">
    <span style="margin-right:8px;">选择日期查看：</span>
    <input type="date" id="selectDate" onchange="selectByDate()">
  </div>

  <div class="select-box">
    <select id="period">
      <option value="all">📅 全部数据</option>
      <option value="1-15">1月 1日-15日</option>
      <option value="16-31">1月 16日-31日</option>
      <option value="2-15">2月 1日-15日</option>
      <option value="16-28">2月 16日-28日</option>
      <option value="3-15">3月 1日-15日</option>
      <option value="16-31-3">3月 16日-31日</option>
      <option value="1-15-4">4月 1日-15日</option>
      <option value="16-30-4">4月 16日-30日</option>
    </select>
  </div>

  <div class="analysis-box" id="analysis">
    <h3>📊 时段分析</h3>
    <p>请选择时间段查看分析</p>
  </div>

  <!-- 发电 & 用户 同图对比 -->
  <div class="card">
    <h2>📊 发电侧 vs 用户侧 电量对比</h2>
    <canvas id="chartCompare"></canvas>
  </div>

  <div class="card">
    <h2>📈 发电侧成交量</h2>
    <canvas id="chartGen"></canvas>
  </div>
  <div class="card">
    <h2>📊 用户侧成交量</h2>
    <canvas id="chartUser"></canvas>
  </div>
  <div class="card">
    <h2>💰 用户侧平均电价</h2>
    <canvas id="chartPrice"></canvas>
  </div>

  <div class="card">
    <h2>📋 详细数据</h2>
    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>发电侧<br/>MWh</th>
          <th>用户侧<br/>MWh</th>
          <th>均价<br/>元/MWh</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

<script>
let allData = [];
let charts = {};

// 日期选择查看某天
function selectByDate() {
  const dateStr = document.getElementById('selectDate').value;
  if (!dateStr || !allData.length) return;

  const parts = dateStr.split('-');
  const m = parseInt(parts[1]);
  const d = parseInt(parts[2]);
  const target = `${m}.${d}`;

  const item = allData.find(i => i.日期 === target);
  if (!item) return;

  document.getElementById('lastGen').innerText = parseFloat(item['发电侧总成交量（MWh）']).toLocaleString();
  document.getElementById('lastUse').innerText = parseFloat(item['用户侧总成交量（MWh)']).toLocaleString();
  document.getElementById('lastPrice').innerText = item['用户侧总平均价（元/MWh）'] ?? '待更新';
  document.getElementById('lastDate').innerText = item.日期;
}

function initCharts() {
  const config = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { labels: { color: '#cbd5e1' } },
      tooltip: {
        mode: 'index',
        intersect: false,
        backgroundColor: '#0f172a',
        titleColor: '#fff',
        bodyColor: '#e2e8f0',
        borderColor: '#334155',
        borderWidth:1,
        callbacks: { label: ctx => ctx.dataset.label + '：' + ctx.raw.toLocaleString() }
      }
    },
    scales: { 
      x: { grid: { display: false }, ticks: { color: '#94a3b8' } },
      y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }
    },
    hover: { mode: 'index', intersect: false }
  };

  // 对比图
  charts.compare = new Chart(document.getElementById('chartCompare'), {
    type: 'line',
    data: {
      labels: [],
      datasets: [
        { label: '发电侧 (MWh)', data: [], borderColor: '#00d8ff', tension: 0.4, pointBackgroundColor:'#00d8ff' },
        { label: '用户侧 (MWh)', data: [], borderColor: '#f472b6', tension: 0.4, pointBackgroundColor:'#f472b6' }
      ]
    },
    options: config
  });

  charts.gen = new Chart(document.getElementById('chartGen'), {
    type: 'line', 
    data: { 
      labels: [], 
      datasets: [{ label: '发电侧 (MWh)', data: [], borderColor: '#00d8ff', tension: 0.4, pointBackgroundColor:'#00d8ff' }] 
    }, 
    options: config 
  });

  charts.user = new Chart(document.getElementById('chartUser'), {
    type: 'line', 
    data: { 
      labels: [], 
      datasets: [{ label: '用户侧 (MWh)', data: [], borderColor: '#34d399', tension: 0.4, pointBackgroundColor:'#34d399' }] 
    }, 
    options: config 
  });

  charts.price = new Chart(document.getElementById('chartPrice'), {
    type: 'line', 
    data: { 
      labels: [], 
      datasets: [{ label: '电价 (元/MWh)', data: [], borderColor: '#fbbf24', tension: 0.4, pointBackgroundColor:'#fbbf24' }] 
    }, 
    options: config 
  });
}

// 加载数据
async function loadData() {
  try {
    const res = await fetch('data.json?v='+Date.now());
    allData = await res.json();
    renderDashboard();
    render();
    document.getElementById('status').innerText = "✅ 数据加载完成";
  } catch (e) {
    document.getElementById('status').innerText = "❌ 加载失败";
    console.error(e);
  }
}

// 顶部驾驶舱（默认最新一天）
function renderDashboard() {
  if (!allData || allData.length === 0) return;
  const last = allData[allData.length - 1];

  document.getElementById('lastGen').innerText = parseFloat(last['发电侧总成交量（MWh）']).toLocaleString();
  document.getElementById('lastUse').innerText = parseFloat(last['用户侧总成交量（MWh)']).toLocaleString();
  document.getElementById('lastPrice').innerText = last['用户侧总平均价（元/MWh）'] ?? '待更新';
  document.getElementById('lastDate').innerText = last.日期;
}

function filterData() {
  const v = document.getElementById('period').value;
  if (v === 'all') return allData;

  return allData.filter(item => {
    const [m, d] = item.日期.split('.').map(Number);
    
    if (v === '1-15')   return m === 1 && d >= 1 && d <= 15;
    if (v === '16-31') return m === 1 && d >= 16 && d <= 31;
    if (v === '2-15')   return m === 2 && d >= 1 && d <= 15;
    if (v === '16-28') return m === 2 && d >= 16 && d <= 28;
    if (v === '3-15')   return m === 3 && d >= 1 && d <= 15;
    if (v === '16-31-3') return m === 3 && d >= 16 && d <= 31;
    if (v === '1-15-4') return m === 4 && d >= 1 && d <= 15;
    if (v === '16-30-4') return m === 4 && d >= 16 && d <= 30;
    
    return true;
  });
}

const analysisText = {
  "1-15": `<h3>📊 1月1日–15日 分析</h3><p>• 用电需求保持高位，工业生产正常，负荷稳定。</p><p>• 电价整体偏高，受冬季用电与供需偏紧影响。</p>`,
  "16-31": `<h3>📊 1月16日–31日 分析</h3><p>• 春节临近，企业陆续放假，用电负荷开始回落。</p><p>• 电价有所波动，节前用电需求减弱，市场趋于宽松。</p>`,
  "2-15": `<h3>📊 2月1日–15日 分析</h3><p>• 春节假期核心期，工业用电大幅下降，整体负荷显著走低。</p><p>• 电价明显回落，部分日期低位运行，供需关系宽松。</p>`,
  "16-28": `<h3>📊 2月16日–28日 分析</h3><p>• 节后复工推进，工业用电逐步回升，负荷持续爬坡。</p><p>• 电价随需求恢复稳步上涨，市场回归正常水平。</p>`,
  "3-15": `<h3>📊 3月1日–15日 分析</h3><p>• 全面复工复产，用电稳步回升，负荷恢复至节前水平。</p><p>• 电价震荡上行，供需关系逐步回归常态偏紧。</p>`,
  "16-31-3": `<h3>📊 3月16日–31日 分析</h3><p>• 工业生产满负荷运行，用电量持续攀升创阶段新高。</p><p>• 供需格局持续收紧，电价大幅上涨，市场热度提升。</p>`,
  "1-15-4": `<h3>📊 4月1日–15日 分析</h3><p>• 用电需求持续攀升，供需缺口进一步扩大。</p><p>• 电价维持高位运行，市场整体偏紧。</p>`,
  "16-30-4": `<h3>📊 4月16日–30日 分析</h3><p>• 用电负荷保持高位，供需差值明显。</p><p>• 电价受供需关系影响波动明显，后期数据待更新。</p>`,
  "all": `<h3>📊 全周期分析</h3><p>• 1-2月春节波动，3-4月持续走强，用电趋势清晰。</p><p>• 电价与负荷高度同步，季节性特征显著。</p>`
};

function updateAnalysis() {
  const v = document.getElementById('period').value;
  document.getElementById('analysis').innerHTML = analysisText[v] || analysisText.all;
}

function render() {
  const data = filterData();
  const dates = data.map(i => i.日期);
  const gen = data.map(i => +i['发电侧总成交量（MWh）'] || 0);
  const use = data.map(i => +i['用户侧总成交量（MWh)'] || 0);
  
  // 电价
  const price = data.map(i => {
    const v = i['用户侧总平均价（元/MWh）'];
    return v == null ? null : parseFloat(v);
  });

  // 更新对比图
  charts.compare.data.labels = dates;
  charts.compare.data.datasets[0].data = gen;
  charts.compare.data.datasets[1].data = use;
  charts.compare.update();

  charts.gen.data.labels = dates;
  charts.gen.data.datasets[0].data = gen;
  charts.gen.update();

  charts.user.data.labels = dates;
  charts.user.data.datasets[0].data = use;
  charts.user.update();

  charts.price.data.labels = dates;
  charts.price.data.datasets[0].data = price;
  charts.price.update();

  // 表格
  document.getElementById('tableBody').innerHTML = data.map(row => `
    <tr>
      <td>${row.日期}</td>
      <td>${parseFloat(row['发电侧总成交量（MWh）']).toLocaleString()}</td>
      <td>${parseFloat(row['用户侧总成交量（MWh)']).toLocaleString()}</td>
      <td>${row['用户侧总平均价（元/MWh）'] ?? '待更新'}</td>
    </tr>
  `).join('');

  updateAnalysis();
}

document.getElementById('period').addEventListener('change', render);
initCharts();
loadData();
</script>
</body>
</html>
